<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hand Battle - RPS Game</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600&display=swap');

    :root {
      --green: #00ff88;
      --yellow: #ffdd00;
      --red: #ff4455;
      --bg: #0a0a0f;
      --card: #12121a;
      --border: #2a2a3a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      background-image: radial-gradient(circle at 20% 20%, rgba(0,255,136,0.04) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(255,68,85,0.04) 0%, transparent 50%);
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 24px;
    }

    .header .tag {
      font-size: 0.7rem;
      letter-spacing: 4px;
      color: var(--green);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .header h1 {
      font-family: 'Orbitron', monospace;
      font-size: 2.2rem;
      font-weight: 900;
      color: #fff;
      letter-spacing: 3px;
    }

    .header h1 span { color: var(--green); }

    /* Score Row */
    .score-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 12px;
      width: 100%;
      max-width: 500px;
      margin-bottom: 24px;
      align-items: center;
    }

    .score-block {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      text-align: center;
    }

    .score-block .s-label {
      font-size: 0.65rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .score-block.player .s-label { color: var(--green); }
    .score-block.computer .s-label { color: var(--red); }

    .score-block .s-num {
      font-family: 'Orbitron', monospace;
      font-size: 2.4rem;
      font-weight: 700;
      line-height: 1;
    }

    .score-block.player .s-num { color: var(--green); }
    .score-block.computer .s-num { color: var(--red); }

    .score-mid {
      font-family: 'Orbitron', monospace;
      font-size: 0.75rem;
      color: #555;
      text-align: center;
      letter-spacing: 1px;
    }

    .score-mid .draws {
      font-size: 1.1rem;
      color: var(--yellow);
      display: block;
      font-weight: 700;
    }

    /* Arena */
    .arena {
      width: 100%;
      max-width: 500px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 20px;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }

    .arena::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--green), transparent);
    }

    .arena-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .fighter {
      flex: 1;
      text-align: center;
    }

    .fighter .f-label {
      font-size: 0.65rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 10px;
      color: #555;
    }

    .fighter.left .f-label { color: var(--green); }
    .fighter.right .f-label { color: var(--red); }

    .fighter .hand {
      font-size: 4rem;
      display: block;
      transition: transform 0.3s;
      line-height: 1.2;
    }

    .fighter.right .hand {
      transform: scaleX(-1);
    }

    .fighter.right .hand.flip {
      transform: scaleX(-1);
    }

    .arena-divider {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .vs-text {
      font-family: 'Orbitron', monospace;
      font-size: 1.1rem;
      font-weight: 900;
      color: #333;
    }

    .result-badge {
      font-family: 'Orbitron', monospace;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 2px;
      padding: 5px 10px;
      border-radius: 6px;
      min-width: 70px;
      text-align: center;
    }

    .result-badge.win  { background: rgba(0,255,136,0.15); color: var(--green); border: 1px solid var(--green); }
    .result-badge.lose { background: rgba(255,68,85,0.15);  color: var(--red);   border: 1px solid var(--red); }
    .result-badge.draw { background: rgba(255,221,0,0.15);  color: var(--yellow); border: 1px solid var(--yellow); }
    .result-badge.idle { background: transparent; color: #333; border: 1px solid #222; }

    /* Choices */
    .choices-section {
      width: 100%;
      max-width: 500px;
      margin-bottom: 20px;
    }

    .choices-section .c-title {
      font-size: 0.65rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #555;
      text-align: center;
      margin-bottom: 12px;
    }

    .choices {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .choice-btn {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 10px;
      cursor: pointer;
      color: #fff;
      text-align: center;
      transition: all 0.15s;
      font-family: 'Rajdhani', sans-serif;
    }

    .choice-btn:hover {
      border-color: var(--green);
      background: rgba(0,255,136,0.06);
      transform: translateY(-3px);
    }

    .choice-btn:active { transform: scale(0.97); }

    .choice-btn .c-icon { font-size: 2.2rem; display: block; margin-bottom: 6px; }
    .choice-btn .c-name {
      font-size: 0.75rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #777;
    }

    /* Bottom row */
    .bottom-row {
      display: flex;
      gap: 10px;
      width: 100%;
      max-width: 500px;
    }

    .reset-btn {
      flex: 1;
      background: transparent;
      border: 1px solid var(--border);
      color: #555;
      border-radius: 10px;
      padding: 12px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }

    .reset-btn:hover { border-color: var(--red); color: var(--red); }

    /* Log */
    .log {
      width: 100%;
      max-width: 500px;
      margin-top: 20px;
    }

    .log-title {
      font-size: 0.65rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #333;
      margin-bottom: 10px;
    }

    .log-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: 140px;
      overflow-y: auto;
    }

    .log-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 12px;
      border-radius: 6px;
      background: #0d0d14;
      border-left: 3px solid #222;
      font-size: 0.82rem;
      color: #666;
    }

    .log-item.win  { border-left-color: var(--green); }
    .log-item.lose { border-left-color: var(--red); }
    .log-item.draw { border-left-color: var(--yellow); }

    .log-item .log-tag {
      font-family: 'Orbitron', monospace;
      font-size: 0.6rem;
      letter-spacing: 1px;
    }

    .log-item.win  .log-tag { color: var(--green); }
    .log-item.lose .log-tag { color: var(--red); }
    .log-item.draw .log-tag { color: var(--yellow); }

    /* shake animation */
    @keyframes shake {
      0%,100% { transform: translateY(0); }
      25% { transform: translateY(-8px); }
      75% { transform: translateY(8px); }
    }

    .shaking { animation: shake 0.4s ease; }

    @media (max-width: 400px) {
      .header h1 { font-size: 1.5rem; }
      .fighter .hand { font-size: 3rem; }
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="tag">// GAME //</div>
    <h1>HAND <span>BATTLE</span></h1>
  </div>

  <!-- Score -->
  <div class="score-row">
    <div class="score-block player">
      <div class="s-label">You</div>
      <div class="s-num" id="p-score">0</div>
    </div>
    <div class="score-mid">
      <span class="draws" id="d-score">0</span>
      DRAWS
    </div>
    <div class="score-block computer">
      <div class="s-label">CPU</div>
      <div class="s-num" id="c-score">0</div>
    </div>
  </div>

  <!-- Arena -->
  <div class="arena">
    <div class="arena-inner">
      <div class="fighter left">
        <div class="f-label">Player</div>
        <span class="hand" id="p-hand">🤜</span>
      </div>
      <div class="arena-divider">
        <div class="vs-text">VS</div>
        <div class="result-badge idle" id="result-badge">—</div>
      </div>
      <div class="fighter right">
        <div class="f-label">CPU</div>
        <span class="hand" id="c-hand">🤛</span>
      </div>
    </div>
  </div>

  <!-- Choices -->
  <div class="choices-section">
    <div class="c-title">Select Your Move</div>
    <div class="choices">
      <button class="choice-btn" onclick="play('rock')">
        <span class="c-icon">🪨</span>
        <span class="c-name">Rock</span>
      </button>
      <button class="choice-btn" onclick="play('paper')">
        <span class="c-icon">📄</span>
        <span class="c-name">Paper</span>
      </button>
      <button class="choice-btn" onclick="play('scissors')">
        <span class="c-icon">✂️</span>
        <span class="c-name">Scissors</span>
      </button>
    </div>
  </div>

  <!-- Bottom -->
  <div class="bottom-row">
    <button class="reset-btn" onclick="resetGame()">⟳ Reset Game</button>
  </div>

  <!-- Log -->
  <div class="log">
    <div class="log-title">// Battle Log</div>
    <div class="log-list" id="log-list"></div>
  </div>

<script>
  const moves = ['rock','paper','scissors'];
  const icons = { rock:'🪨', paper:'📄', scissors:'✂️' };
  const hands = { rock:'✊', paper:'✋', scissors:'✌️' };

  let ps=0, cs=0, ds=0;

  function play(player) {
    const cpu = moves[Math.floor(Math.random()*3)];

    const ph = document.getElementById('p-hand');
    const ch = document.getElementById('c-hand');

    ph.textContent = hands[player];
    ch.textContent = hands[cpu];

    // shake anim
    ph.classList.add('shaking');
    ch.classList.add('shaking');
    setTimeout(()=>{ ph.classList.remove('shaking'); ch.classList.remove('shaking'); }, 400);

    const badge = document.getElementById('result-badge');
    let res, cls;

    if (player === cpu) {
      res = 'DRAW'; cls = 'draw'; ds++;
      document.getElementById('d-score').textContent = ds;
    } else if (
      (player==='rock'&&cpu==='scissors')||
      (player==='paper'&&cpu==='rock')||
      (player==='scissors'&&cpu==='paper')
    ) {
      res = 'WIN'; cls = 'win'; ps++;
      document.getElementById('p-score').textContent = ps;
    } else {
      res = 'LOSE'; cls = 'lose'; cs++;
      document.getElementById('c-score').textContent = cs;
    }

    badge.textContent = res;
    badge.className = 'result-badge ' + cls;

    // log
    const log = document.getElementById('log-list');
    const item = document.createElement('div');
    item.className = 'log-item ' + cls;
    item.innerHTML = `<span>${icons[player]} vs ${icons[cpu]}</span><span class="log-tag">${res}</span>`;
    log.prepend(item);
  }

  function resetGame() {
    ps=cs=ds=0;
    document.getElementById('p-score').textContent=0;
    document.getElementById('c-score').textContent=0;
    document.getElementById('d-score').textContent=0;
    document.getElementById('p-hand').textContent='🤜';
    document.getElementById('c-hand').textContent='🤛';
    const badge=document.getElementById('result-badge');
    badge.textContent='—';
    badge.className='result-badge idle';
    document.getElementById('log-list').innerHTML='';
  }
</script>
</body>
</html>
